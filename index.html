<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCET 2026 Pro Rank Predictor</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --accent: #dc2626;
            --bg: #f8fafc;
        }
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .app-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: var(--secondary); margin-bottom: 5px; font-weight: 800; }
        .subtitle { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; color: #475569; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0;
            border-radius: 10px; font-size: 16px; transition: 0.3s; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button {
            width: 100%; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 18px; font-weight: 700;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        button:hover { background: var(--secondary); transform: translateY(-2px); }

        .result-section { margin-top: 25px; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .rank-card {
            background: #f1f5f9; padding: 20px; border-radius: 15px; text-align: center;
            border-left: 5px solid var(--primary);
        }
        .rank-title { font-size: 14px; font-weight: 600; color: #64748b; }
        .rank-value { font-size: 32px; font-weight: 800; color: var(--accent); display: block; }
        
        .goal-box {
            margin-top: 15px; background: #ecfdf5; padding: 15px; border-radius: 12px;
            border-left: 5px solid #10b981; font-size: 13px; line-height: 1.5;
        }
        .goal-title { font-weight: 800; color: #065f46; display: block; margin-bottom: 5px; }

        .branch-badge {
            display: inline-block; padding: 4px 10px; border-radius: 6px; 
            font-size: 11px; font-weight: 700; margin-top: 10px;
        }
        .prob-high { background: #dcfce7; color: #166534; }
        .prob-low { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>KCET Rank Pro</h2>
    <div class="subtitle">State Board Edition • 2026 Predictor</div>
    
    <div class="input-group">
        <label>PUC Board PCM Total (out of 300)</label>
        <input type="number" id="board" placeholder="e.g. 265">
    </div>

    <div class="input-group">
        <label>KCET PCM Total (out of 180)</label>
        <input type="number" id="kcet" placeholder="e.g. 90">
    </div>

    <div class="input-group">
        <label>Number of Blind Guesses</label>
        <input type="number" id="guess" placeholder="0">
    </div>

    <div class="input-group">
        <label>Paper Difficulty</label>
        <select id="diff">
            <option value="1">Moderate (Normal)</option>
            <option value="0.95">Hard (Ranks Improve)</option>
            <option value="1.05">Easy (High Competition)</option>
        </select>
    </div>

    <button onclick="predict()">Calculate My Rank</button>

    <div id="results" class="result-section">
        <div class="rank-card">
            <span class="rank-title">Estimated Rank Range</span>
            <span class="rank-value" id="rankDisplay"></span>
            <div id="branchProb"></div>
        </div>

        <div class="goal-box" id="goalBox">
            <span class="goal-title">🎯 The Next Milestone</span>
            <span id="goalText"></span>
        </div>
    </div>
</div>

<script>
    function predict() {
        const board = parseFloat(document.getElementById('board').value) || 0;
        const kcet = parseFloat(document.getElementById('kcet').value) || 0;
        const guess = parseInt(document.getElementById('guess').value) || 0;
        const diffMult = parseFloat(document.getElementById('diff').value);

        // 1. Core Logic (50:50)
        const comp = ((board/300)*50) + ((kcet/180)*50);

        // 2. Realistic Base Rank Logic
        let base;
        if (comp >= 90) base = (100 - comp) * 300;
        else if (comp >= 80) base = 3000 + ((90 - comp) * 700);
        else if (comp >= 70) base = 10000 + ((80 - comp) * 1000);
        else if (comp >= 60) base = 20000 + ((70 - comp) * 1500);
        else base = 35000 + ((60 - comp) * 3500);

        // 3. User adjustments
        const penalty = guess * 100;
        let finalRank = Math.floor((base * diffMult) + penalty);
        if (finalRank < 1) finalRank = 1;

        // 4. Feature: Branch Probability (Extra Feature)
        let branchHtml = "";
        if (finalRank < 5000) branchHtml = '<span class="branch-badge prob-high">High Chance: CS/IS in Top Colleges</span>';
        else if (finalRank < 15000) branchHtml = '<span class="branch-badge prob-high">High Chance: ECE/Mechanical</span>';
        else branchHtml = '<span class="branch-badge prob-low">CS/IS might be tough in Tier 1</span>';

        // 5. Feature: The Goal Tracker
        let targetRank = 1000;
        if (finalRank > 20000) targetRank = 10000;
        else if (finalRank > 10000) targetRank = 5000;
        else if (finalRank > 5000) targetRank = 2000;
        else targetRank = 500;

        // Back-calculating marks needed for target rank
        // Approximate composite needed for milestone ranks
        const targets = {10000: 78, 5000: 84, 2000: 90, 500: 95};
        const neededComp = targets[targetRank] || 95;
        const neededKcetMarks = Math.ceil((((neededComp - ((board/300)*50))/50) * 180));
        const diffMarks = Math.max(0, neededKcetMarks - kcet);

        // UI Updates
        document.getElementById('results').style.display = 'block';
        document.getElementById('rankDisplay').innerText = `${(finalRank-500).toLocaleString()} - ${(finalRank+500).toLocaleString()}`;
        document.getElementById('branchProb').innerHTML = branchHtml;
        
        if (diffMarks > 0) {
            document.getElementById('goalText').innerHTML = `To reach the <b>Top ${targetRank.toLocaleString()} Rank</b>, you need approximately <b>${diffMarks} more marks</b> in KCET!`;
        } else {
            document.getElementById('goalText').innerHTML = `Amazing! You are already on track for the <b>Top ${targetRank.toLocaleString()} Rank</b>. Keep it up!`;
        }
    }
</script>

</body>
</html>
