<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS.RANK | QUANTUM PREDICTOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #030712;
            --glass-bg: rgba(6, 11, 25, 0.8);
            --glass-border: rgba(0, 243, 255, 0.3);
        }
        
        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(188, 19, 254, 0.2), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 243, 255, 0.2), transparent 40%);
            font-family: 'Rajdhani', sans-serif;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .cyber-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            position: relative;
            border-top: 4px solid var(--neon-cyan);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-cyan);
            letter-spacing: 4px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            font-size: 11px;
            color: var(--neon-purple);
            margin-bottom: 30px;
            letter-spacing: 5px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 18px; }
        label {
            display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px;
            color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px;
        }
        input, select {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 18px;
            box-sizing: border-box; transition: 0.3s;
        }
        input:focus {
            outline: none; border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        button {
            width: 100%; padding: 18px; background: transparent;
            color: var(--neon-cyan); font-family: 'Orbitron', sans-serif;
            font-weight: 900; border: 2px solid var(--neon-cyan); border-radius: 12px;
            cursor: pointer; transition: 0.4s; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 2px;
        }
        button:hover {
            background: var(--neon-cyan); color: #000;
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        .result-section { margin-top: 35px; display: none; }
        
        .rank-box {
            background: rgba(0, 0, 0, 0.4); padding: 25px; border-radius: 16px;
            text-align: center; border: 1px solid var(--neon-purple);
        }
        .rank-label { font-size: 12px; color: #94a3b8; letter-spacing: 2px; }
        .rank-output {
            font-family: 'Orbitron', sans-serif; font-size: 36px; 
            color: #fff; text-shadow: 0 0 20px var(--neon-purple); margin: 8px 0; display: block;
        }

        .goal-alert {
            margin-top: 20px; background: rgba(0, 243, 255, 0.08); padding: 18px;
            border-radius: 16px; border-right: 4px solid var(--neon-cyan);
            font-size: 14px; line-height: 1.6; border-left: 1px solid rgba(0, 243, 255, 0.2);
        }
        .bright { color: var(--neon-cyan); font-weight: 800; }
    </style>
</head>
<body>

<div class="cyber-card">
    <h2>QUANTX.PREDICT</h2>
    <div class="subtitle">CALIBRATION V4.0</div>
    
    <div class="input-group">
        <label>PUC Board PCM (300)</label>
        <input type="number" id="board" value="265">
    </div>

    <div class="input-group">
        <label>KCET PCM Score (180)</label>
        <input type="number" id="kcet" value="90">
    </div>

    <div class="input-group">
        <label>Simulation Difficulty</label>
        <select id="diff">
            <option value="mid">Standard Matrix</option>
            <option value="hard">Hard (+ Rank Boost)</option>
            <option value="easy">Easy (- Rank Penalty)</option>
        </select>
    </div>

    <button onclick="simulate()">RUN SIMULATION</button>

    <div id="results" class="result-section">
        <div class="rank-box">
            <span class="rank-label">ESTIMATED RANK VECTOR</span>
            <span class="rank-output" id="rankDisplay"></span>
            <span style="color: var(--neon-cyan); font-weight: 700; font-size: 13px;" id="compText"></span>
        </div>

        <div class="goal-alert" id="goalBox"></div>
    </div>
</div>

<script>
    function simulate() {
        const board = parseFloat(document.getElementById('board').value) || 0;
        const kcet = parseFloat(document.getElementById('kcet').value) || 0;
        const diff = document.getElementById('diff').value;

        // 1. Precise Composite (50:50)
        const boardPct = (board / 300) * 100;
        const kcetPct = (kcet / 180) * 100;
        const comp = (boardPct + kcetPct) / 2;

        // 2. Calibrated Alg (Refined constants for better precision)
        const logRank = (-0.111 * comp) + 17.36;
        let baseRank = Math.exp(logRank);

        // Difficulty Modifiers
        if (diff === "hard") baseRank *= 0.94;
        if (diff === "easy") baseRank *= 1.08;

        const centerRank = Math.floor(baseRank);
        const lower = Math.max(1, centerRank - 500);
        const upper = centerRank + 500;

        // 3. Smart Goal Acquisition (Only suggest possible goals)
        const milestones = [500, 1000, 2000, 5000, 10000, 15000, 20000, 30000];
        let nextTarget = 0;
        
        // Find the closest higher milestone
        for (let m of milestones) {
            if (centerRank > m) {
                nextTarget = m;
                break;
            }
        }

        // Calculate needed KCET marks for that target
        // log(m) = -0.111 * targetComp + 17.36
        const targetComp = (17.36 - Math.log(nextTarget)) / 0.111;
        const neededKcetPct = (targetComp * 2) - boardPct;
        const neededKcetMarks = Math.ceil((neededKcetPct / 100) * 180);
        const extraNeeded = neededKcetMarks - kcet;

        // Render UI
        document.getElementById('results').style.display = 'block';
        document.getElementById('rankDisplay').innerText = `${lower.toLocaleString()} - ${upper.toLocaleString()}`;
        document.getElementById('compText').innerText = `COMPOSITE: ${comp.toFixed(2)}%`;

        let goalHtml = "";
        if (extraNeeded > 0 && neededKcetMarks <= 180) {
            goalHtml = `TARGET: Rank <span class="bright">${nextTarget.toLocaleString()}</span><br>Status: Secure <span class="bright">+${extraNeeded} more marks</span> in KCET to breach this threshold.`;
        } else if (neededKcetMarks > 180) {
            // If the next milestone is impossible, find the absolute best rank possible (180/180)
            const maxComp = (boardPct + 100) / 2;
            const maxRank = Math.floor(Math.exp((-0.111 * maxComp) + 17.36));
            goalHtml = `SYSTEM LIMIT: With your board marks, the best possible rank is <span class="bright">~${maxRank.toLocaleString()}</span> (requires 180/180).`;
        } else {
            goalHtml = `STATUS: <span class="bright">ELITE</span>. You are currently outperforming standard projections for this sector.`;
        }
        
        document.getElementById('goalBox').innerHTML = goalHtml;
    }
</script>

</body>
</html>
