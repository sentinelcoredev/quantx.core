        }

        }

            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);

        }

        .back-link {
            display: inline-block;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary-blue);
        }

        /* Search & Filter Section */
        .filter-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr; /* Mobile default */
            gap: 15px;
        }

        @media (min-width: 600px) {
            .filter-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 800px) {
            .filter-section {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
            appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--primary-blue);
        }

        /* AdSense Container */
        .adsense-container {
            width: 100%;
            min-height: 100px;
            background-color: var(--card-bg);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            padding: 10px;
        }

        /* Results Grid */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }

        .results-count {
            color: var(--primary-blue);
            font-weight: 600;
        }

        .college-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .college-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .college-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-2px);
        }

        .college-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .college-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            padding-right: 10px;
        }

        .cutoff-badge {
            background-color: rgba(96, 165, 250, 0.1);
            color: var(--primary-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .college-details {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .detail-row span {
            color: var(--text-main);
            font-weight: 500;
        }

        .category-tag {
            display: inline-block;
            background-color: var(--border-color);
            color: var(--text-main);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 6px;
        }

            padding: 40px 20px;
            color: var(--text-muted);
            background-color: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>

    const collegeGrid = document.getElementById('collegeGrid');
    const resultCount = document.getElementById('resultCount');

    function renderColleges() {
        const userRank = parseInt(rankInput.value) || 0;
        const selectedBranch = branchFilter.value;
        const selectedCategory = categoryFilter.value;
        const selectedCity = cityFilter.value;

        // Clear current grid
        collegeGrid.innerHTML = '';

        // Filter Logic (Now includes Category)
        const filteredData = collegeDatabase.filter(college => {
            const matchesRank = userRank === 0 || userRank <= college.cutoff;
            const matchesBranch = selectedBranch === 'ALL' || college.branchCode === selectedBranch;
            const matchesCategory = selectedCategory === 'ALL' || college.category === selectedCategory;
            const matchesCity = selectedCity === 'ALL' || college.location === selectedCity;

            return matchesRank && matchesBranch && matchesCategory && matchesCity;
        });

        // Sort by cutoff rank
        filteredData.sort((a, b) => a.cutoff - b.cutoff);

        // Update Count
        resultCount.textContent = `${filteredData.length} Found`;

        // Render Cards
        if (filteredData.length === 0) {
            collegeGrid.innerHTML = `
                <div class="no-results">
                    <h3>No colleges found.</h3>
                    <p style="margin-top: 8px;">Try adjusting your rank or changing the filters.</p>
                </div>`;
            return;
        }

        filteredData.forEach(college => {
            const card = document.createElement('div');
            card.className = 'college-card';
            
            card.innerHTML = `
                <div class="college-header">
                    <div class="college-name">${college.name}</div>
                    <div class="cutoff-badge">Rank: ${Math.floor(college.cutoff)}</div>
                </div>

                    <div class="detail-row">Branch: <span>${college.branchName}</span></div>
                    <div class="detail-row">

                    </div>
                    <div class="detail-row">City: <span>${college.location}</span></div>
                </div>
            `;
            collegeGrid.appendChild(card);
        });
    }

    categoryFilter.addEventListener('change', renderColleges); // Listener for new dropdown
    cityFilter.addEventListener('change', renderColleges);

    // Initial Render
    renderColleges();
