<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTX.CORE | KCET 2026 Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* FUTURISTIC & FORMAL CSS */
        :root {
            --bg-color: #050505;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #111827 0%, #050505 70%);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Auto-hiding timer */
        #countdown-timer {
            width: 100%;
            text-align: center;
            background: rgba(56, 189, 248, 0.05);
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            font-size: 0.85rem;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        main {
            width: 90%;
            max-width: 500px;
            margin-top: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            transition: border 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button.calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.3s;
        }

        button.calc-btn:hover {
            transform: translateY(-2px);
            background: #7dd3fc;
        }

        /* Results Section - Hidden by default */
        #result-wrapper {
            display: none;
            margin-top: 30px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        #predicted-rank {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .college-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 14px 24px;
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s;
            width: 100%;
            box-sizing: border-box;
        }

        .college-btn:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .live-tracker {
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div id="countdown-timer">T-Minus: <span id="timer-text">00:00:00:00</span></div>

    <main>
        <div class="header">
            <h1>QUANTX.CORE</h1>
            <p>Predictive Algorithm Engine</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Board PCM Marks (Out of 300)</label>
                <input type="number" id="board" placeholder="e.g. 285">
            </div>
            
            <div class="input-group">
                <label>KCET Marks (Out of 180)</label>
                <input type="number" id="kcet" placeholder="e.g. 110">
            </div>

            <button class="calc-btn" id="calculate-btn">Initialize Prediction</button>

            <div id="result-wrapper">
                <p style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; margin: 0;">Estimated 2026 Rank</p>
                <div id="predicted-rank">--</div>
                
                <a href="colleges.html" class="college-btn">→ Access College Predictor</a>
                
                <div class="live-tracker">
                    <div class="pulse-dot"></div>
                    <div><span id="user-count" style="color: #fff; font-weight: 700;">1,248</span> Active Users Analyzing</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        (function() {
            // 1. AUTO-EXPIRING TIMER LOGIC
            const targetDate = new Date("April 23, 2026 09:00:00").getTime();
            const timerElement = document.getElementById("countdown-timer");
            const timerText = document.getElementById("timer-text");

            const timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    clearInterval(timerInterval);
                    timerElement.style.display = "none"; // Disappears automatically
                    return;
                }

                const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);
                
                timerText.innerText = `${d}d ${h}h ${m}m ${s}s`;
            }, 1000);

            // 2. LIVE USER FLUCTUATION LOGIC
            const userCountEl = document.getElementById("user-count");
            let baseUsers = 1248;
            setInterval(() => {
                // Randomly add or subtract 1 to 3 users every few seconds to look active
                const fluctuation = Math.floor(Math.random() * 5) - 2; 
                baseUsers += fluctuation;
                if(baseUsers < 1100) baseUsers = 1150; // Keep it realistic
                userCountEl.innerText = baseUsers.toLocaleString();
            }, 3500);

            // 3. CORE ALGORITHM LOGIC (Translated & Corrected from Python)
            document.getElementById("calculate-btn").addEventListener("click", function() {
                const boardMarks = parseFloat(document.getElementById("board").value);
                const kcetMarks = parseFloat(document.getElementById("kcet").value);

                // Basic validation
                if (isNaN(boardMarks) || isNaN(kcetMarks) || boardMarks < 0 || boardMarks > 300 || kcetMarks < 0 || kcetMarks > 180) {
                    alert("Please enter valid marks.");
                    return;
                }

                const totalStudents = 190000;
                const boardPct = (boardMarks / 300.0) * 100.0;
                const kcetPct = (kcetMarks / 180.0) * 100.0;
                const compositeScore = (boardPct + kcetPct) / 2.0;

                let predictedRank = 0;

                if (compositeScore > 80.0) {
                    const baseRank = 1000;
                    const steepness = 0.08;
                    predictedRank = baseRank + Math.exp(steepness * (80.0 - compositeScore));
                } 
                else if (compositeScore >= 65.0) {
                    const lowScore = 65.0, lowRank = 130000;
                    const highScore = 80.0, highRank = 10000;
                    const t = (compositeScore - lowScore) / (highScore - lowScore);
                    // Fixed mathematical interpolation:
                    predictedRank = lowRank - t * (lowRank - highRank); 
                } 
                else {
                    const lowScore = 0.0, lowRank = totalStudents;
                    const highScore = 65.0, highRank = 130000;
                    const t = (compositeScore - lowScore) / (highScore - lowScore + 0.000001);
                    // Fixed mathematical interpolation:
                    predictedRank = lowRank - t * (lowRank - highRank);
                }

                // Final cleanup of the number
                predictedRank = Math.floor(Math.max(1, predictedRank));

                // Reveal Results UI
                document.getElementById("predicted-rank").innerText = predictedRank.toLocaleString();
                document.getElementById("result-wrapper").style.display = "block";
                
                // Smooth scroll down to show the new buttons
                document.getElementById("result-wrapper").scrollIntoView({ behavior: 'smooth', block: 'end' });
            });
        })();
    </script>
</body>
</html>
